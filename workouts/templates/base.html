<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Workout Logger{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg-0: #0b0f12;
        --bg-1: #111827;
        --surface-0: #151b24;
        --surface-1: #1a2230;
        --ink: #f8fafc;
        --muted: #9aa4b2;
        --accent: #f97316;
        --accent-2: #22d3ee;
        --border: rgba(148, 163, 184, 0.2);
        --shadow: 0 20px 60px rgba(4, 6, 10, 0.6);
        --glow: 0 0 0 1px rgba(249, 115, 22, 0.1);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Space Grotesk", system-ui, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(249, 115, 22, 0.08), transparent 42%),
          radial-gradient(circle at 20% 20%, rgba(34, 211, 238, 0.08), transparent 40%),
          linear-gradient(180deg, var(--bg-0), var(--bg-1));
        color: var(--ink);
        min-height: 100vh;
      }
      h1, h2, h3, h4 {
        font-family: "Bebas Neue", "Space Grotesk", sans-serif;
        letter-spacing: 0.5px;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        backdrop-filter: blur(12px);
        background: rgba(11, 15, 18, 0.8);
        border-bottom: 1px solid var(--border);
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      header a {
        color: var(--ink);
        text-decoration: none;
        font-weight: 600;
        margin-right: 14px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-size: 12px;
      }
      header a:hover {
        color: var(--accent);
      }
      a {
        color: var(--accent-2);
      }
      a:hover {
        color: var(--accent);
      }
      main {
        max-width: 1100px;
        margin: 24px auto 80px;
        padding: 0 16px;
        animation: page-in 0.5s ease both;
      }
      @keyframes page-in {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes card-rise {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .card {
        background: var(--surface-0);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 18px;
        margin-bottom: 16px;
        box-shadow: var(--shadow);
        animation: card-rise 0.45s ease both;
        animation-delay: calc(var(--i, 0) * 80ms);
      }
      .card.elevated {
        background: var(--surface-1);
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 16px;
        border-radius: 999px;
        border: 1px solid transparent;
        background: var(--accent);
        color: #0b0f12;
        text-decoration: none;
        font-weight: 700;
        letter-spacing: 0.03em;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(249, 115, 22, 0.25);
      }
      .btn.secondary {
        background: transparent;
        color: var(--ink);
        border-color: var(--border);
      }
      .btn.small {
        padding: 6px 12px;
        font-size: 12px;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 12px;
      }
      label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }
      input, textarea, select {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 14px;
        background: rgba(15, 23, 42, 0.6);
        color: var(--ink);
      }
      textarea { min-height: 90px; }
      .muted { color: var(--muted); font-size: 13px; }
      .row {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .row > * { flex: 1; }
      .error {
        background: rgba(239, 68, 68, 0.16);
        color: #fecaca;
        border: 1px solid rgba(239, 68, 68, 0.4);
        padding: 12px;
        border-radius: 12px;
        margin-bottom: 12px;
      }
      .table {
        width: 100%;
        border-collapse: collapse;
      }
      .table th, .table td {
        padding: 12px 10px;
        border-bottom: 1px solid var(--border);
        text-align: left;
        font-size: 14px;
      }
      .table tbody tr:hover {
        background: rgba(148, 163, 184, 0.08);
      }
      .table th {
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 11px;
      }
      .set-pill {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(249, 115, 22, 0.15);
        color: var(--accent);
        font-size: 12px;
        margin: 2px 4px 2px 0;
      }
      code {
        background: rgba(15, 23, 42, 0.7);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 2px 6px;
        font-size: 12px;
        color: var(--accent-2);
      }
      .split {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }
      .calendar-table td {
        position: relative;
        padding: 10px;
        border-bottom: 1px solid var(--border);
      }
      .calendar-cell {
        position: relative;
        border-radius: 10px;
        padding: 8px;
        min-height: 56px;
        overflow: hidden;
      }
      .calendar-cell::after {
        content: "";
        position: absolute;
        inset: 4px;
        background: rgba(249, 115, 22, calc(var(--heat, 0) * 0.35));
        border-radius: 8px;
        z-index: 0;
      }
      .calendar-day {
        position: relative;
        z-index: 1;
        font-weight: 600;
        color: var(--ink);
        text-decoration: none;
      }
      .calendar-cell.is-muted .calendar-day {
        opacity: 0.4;
      }
      .calendar-cell.is-selected {
        outline: 1px solid rgba(249, 115, 22, 0.6);
        box-shadow: var(--glow);
      }
      .calendar-meta {
        position: relative;
        z-index: 1;
        font-size: 11px;
        color: var(--muted);
        margin-top: 4px;
      }
      .stat-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }
      @media (min-width: 900px) {
        .split {
          grid-template-columns: 320px 1fr;
        }
        .stat-grid {
          grid-template-columns: 1fr 1fr;
        }
      }
      @media (max-width: 720px) {
        header {
          flex-direction: column;
          align-items: flex-start;
          gap: 10px;
        }
        .row {
          flex-direction: column;
          align-items: stretch;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        * { animation: none !important; transition: none !important; }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <a href="{% url 'workout-list' %}">Workout Logger</a>
        {% if user.is_authenticated %}
          <a href="{% url 'workout-create' %}">Add Training</a>
          <a href="{% url 'workout-calendar' %}">Calendar</a>
          <a href="{% url 'workout-stats' %}">Stats</a>
          <a href="{% url 'exercise-volume' %}">Exercise Volume</a>
        {% endif %}
      </div>
      <div>
        {% if user.is_authenticated %}
          <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button class="btn secondary small" type="submit">Log out</button>
          </form>
        {% else %}
          <a class="btn small" href="{% url 'login' %}">Log in</a>
        {% endif %}
      </div>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
